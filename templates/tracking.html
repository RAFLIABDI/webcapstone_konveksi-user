<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0">

  <title>Tracking Order</title>

  <style>

    body{

      font-family: Arial;

      background: #f5f6fa;

      margin: 0;

      padding: 30px;

    }

    .container{

      max-width: 700px;

      margin: auto;

      background: white;

      padding: 30px;

      border-radius: 20px;

      box-shadow:
        0 5px 20px rgba(0,0,0,0.08);

    }

    .title{

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 5px;

    }

    .subtitle{

      color: grey;

      margin-bottom: 30px;

    }

    .card{

      background: #f9f9f9;

      padding: 20px;

      border-radius: 15px;

      margin-bottom: 20px;

    }

    .label{

      color: grey;

      font-size: 14px;

    }

    .value{

      font-size: 20px;

      font-weight: bold;

      margin-top: 5px;

    }

    .status{

      display: inline-block;

      padding:
        10px 18px;

      border-radius: 10px;

      color: white;

      font-weight: bold;

      margin-top: 10px;

    }

    .pending{
      background: orange;
    }

    .sewing{
      background: blue;
    }

    .printing{
      background: purple;
    }

    .done{
      background: green;
    }

    .progress-container{

      margin-top: 30px;

    }

    .progress-bar{

      width: 100%;

      height: 12px;

      background: #ddd;

      border-radius: 20px;

      overflow: hidden;

    }

    .progress{

      height: 100%;

      background: #5B5FEF;

    }

    .timeline{

      display: flex;

      justify-content:
        space-between;

      margin-top: 10px;

      font-size: 14px;

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="title">
      TRACKING ORDER
    </div>

    <div class="subtitle">
      Pantau progres produksi realtime
    </div>

    <div class="card">

      <div class="label">
        Kode Order
      </div>

      <div class="value">
        {{ order.kode_order }}
      </div>

    </div>

    <div class="card">

      <div class="label">
        Nama Customer
      </div>

      <div class="value">
        {{ order.nama_customer }}
      </div>

    </div>

    <div class="card">

      <div class="label">
        Produk
      </div>

      <div class="value">
        {{ order.produk }}
      </div>

    </div>

    <div class="card">

      <div class="label">
        Jumlah
      </div>

      <div class="value">
        {{ order.jumlah }}
      </div>

    </div>

    <div class="card">

      <div class="label">
        Status Produksi
      </div>

      <div class="status
      {{ order.status.lower() }}">

        {{ order.status }}

      </div>

      <div class="progress-container">

        <div class="progress-bar">

          <div class="progress"

               style="width:
               {{ progress }}%">

          </div>

        </div>

        <div class="timeline">

          <span>Pending</span>

          <span>Sewing</span>

          <span>Printing</span>

          <span>Done</span>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
