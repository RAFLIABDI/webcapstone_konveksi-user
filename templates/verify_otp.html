<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0">

  <title>Verify OTP</title>

  <style>

    body{

      font-family: Arial;

      background: #f5f6fa;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

    }

    .box{

      background: white;

      padding: 40px;

      border-radius: 20px;

      width: 400px;

      box-shadow:
        0 5px 20px rgba(0,0,0,0.08);

    }

    input{

      width: 100%;

      padding: 15px;

      margin-top: 15px;

      border-radius: 10px;

      border: 1px solid #ddd;

    }

    button{

      width: 100%;

      padding: 15px;

      margin-top: 20px;

      background: #5B5FEF;

      border: none;

      color: white;

      border-radius: 10px;

    }

  </style>

</head>

<body>

  <div class="box">

    <h2>VERIFIKASI OTP</h2>

    <p>
      Masukkan OTP yang dikirim ke email anda
    </p>

    <form action="/verify-otp"
          method="POST">

      <input
        type="hidden"
        name="kode_order"
        value="{{ kode_order }}"
      >

      <input
        type="text"
        name="otp"
        placeholder="Masukkan OTP"
        required
      >

      <button type="submit">

        VERIFIKASI

      </button>

    </form>

  </div>

  

</body>

</html>
